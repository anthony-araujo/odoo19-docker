[options]
; --- Rutas ---
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

; --- Seguridad ---
; Cambiar por una contrasena maestra segura (openssl rand -base64 24)
admin_passwd = CAMBIAR_ESTE_MASTER_PASSWORD

; --- Base de datos ---
; Host, puerto y usuario se pasan tambien via variable de entorno (docker-compose.yaml)
; NO poner db_password aqui: el entrypoint de Odoo usa la variable PASSWORD del entorno
db_host = db
db_port = 5432
db_user = odoo
db_maxconn = 64

; --- Rendimiento ---
; 2 workers para servidor de 2-4 GB RAM / 2 vCPU
; Aumentar a 4+ cuando el servidor tenga 8 GB RAM o mas
workers = 2
max_cron_threads = 1
longpolling_port = 8072

; --- Proxy y seguridad ---
; Obligatorio cuando Nginx esta al frente
proxy_mode = True
; Oculta el listado de bases de datos en produccion
list_db = False

; --- Logs ---
log_level = warn
logfile = /var/log/odoo/odoo.log
log_handler = :WARNING

; --- Limites de memoria (bytes) ---
; soft: 640 MB  |  hard: 768 MB (ajustado para servidor 2 GB)
limit_memory_soft = 671088640
limit_memory_hard = 805306368

; --- Limites de tiempo (segundos) ---
limit_time_cpu = 600
limit_time_real = 1200
limit_request = 8192
