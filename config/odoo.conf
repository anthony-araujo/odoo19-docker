[options]
; --- Rutas ---
; Odoo incluye sus addons base automaticamente.
; Descomentar cuando tengas modulos personalizados en el directorio addons/
; addons_path = /mnt/extra-addons

; --- Seguridad ---
; Master password: requerido para crear/eliminar bases de datos en Odoo
; CAMBIAR ESTO antes de crear la primera BD.
; Generar uno seguro: openssl rand -base64 18
admin_passwd = CAMBIAR_ESTE_MASTER_PASSWORD

; list_db = True   -> mostrar gestor de BD (usar para crear la primera BD)
; list_db = False  -> deshabilitar gestor (recomendado en produccion)
list_db = True

; --- Base de datos ---
; NO agregar db_password aqui: el entrypoint usa la variable PASSWORD del entorno
db_host = db
db_port = 5432
db_user = odoo
db_maxconn = 64

; --- Rendimiento ---
; workers = 0 -> single-thread (recomendado para servidor < 4 GB RAM)
; workers = 2 -> multiprocess (para 4-8 GB RAM)
workers = 2
max_cron_threads = 1

; --- Red y Proxy ---
; Escuchar en todas las interfaces dentro del contenedor (Nginx filtra al exterior)
http_interface = 0.0.0.0
; proxy_mode = True es obligatorio cuando Nginx esta al frente
proxy_mode = True

; --- Logs ---
; Odoo 19 en Docker escribe a stdout por defecto.
; Descomentar para log en archivo persistente:
; logfile = /var/log/odoo/odoo.log
log_level = warn
log_handler = :WARNING

; --- Limites de memoria (bytes) ---
; 640 MB soft / 768 MB hard para servidor de 2 GB RAM
; Cambiar a 2147483648 / 2684354560 para servidor de 8 GB RAM
limit_memory_soft = 671088640
limit_memory_hard = 805306368

; --- Limites de tiempo (segundos) ---
limit_time_cpu = 600
limit_time_real = 1200
limit_request = 8192
