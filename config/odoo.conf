[options]
; --- Rutas ---
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

; --- Seguridad ---
; Cambiar por una contrasena maestra segura (openssl rand -base64 24)
admin_passwd = CAMBIAR_ESTE_MASTER_PASSWORD

; --- Base de datos ---
db_host = db
db_port = 5432
db_user = odoo
; La contrasena se inyecta via Docker secret (PASSWORD_FILE)
db_password = False
db_maxconn = 64

; --- Rendimiento (ajustar segun CPUs disponibles: workers = CPUs * 2 + 1) ---
workers = 4
max_cron_threads = 2
longpolling_port = 8072

; --- Proxy y seguridad ---
; Obligatorio cuando Nginx esta al frente
proxy_mode = True
; Oculta el listado de bases de datos en produccion
list_db = False

; --- Logs ---
log_level = warn
logfile = /var/log/odoo/odoo.log
log_handler = :WARNING

; --- Limites de memoria (bytes) ---
; soft: 2 GB  |  hard: 2.5 GB
limit_memory_soft = 2147483648
limit_memory_hard = 2684354560

; --- Limites de tiempo (segundos) ---
limit_time_cpu = 600
limit_time_real = 1200
limit_request = 8192
