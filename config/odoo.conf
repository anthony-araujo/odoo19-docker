[options]
; --- Rutas ---
; Odoo incluye sus addons base automaticamente.
; Agregar /mnt/extra-addons solo cuando tengas modulos personalizados en addons/
; addons_path = /mnt/extra-addons

; --- Seguridad ---
; Cambiar por una contrasena maestra segura antes de crear la primera BD
; Ejemplo: openssl rand -base64 18
admin_passwd = CAMBIAR_ESTE_MASTER_PASSWORD

; --- Base de datos ---
; Host, puerto y usuario definidos aqui + contrasena via variable PASSWORD del entorno
; NO agregar db_password aqui: el entrypoint de Odoo usa la variable de entorno PASSWORD
db_host = db
db_port = 5432
db_user = odoo
db_maxconn = 64

; --- Rendimiento ---
; workers = 0  → modo single-thread (recomendado para < 4 GB RAM)
; workers = 2  → multiprocess (para 4-8 GB RAM)
workers = 2
max_cron_threads = 1

; --- Red y Proxy ---
; Escuchar en todas las interfaces dentro del contenedor (Nginx hace el filtrado)
http_interface = 0.0.0.0
; proxy_mode = True es obligatorio cuando Nginx esta al frente
proxy_mode = True
; Oculta el listado de bases de datos publica (importante en produccion)
list_db = False

; --- Logs ---
; logfile comentado: Odoo 19 en Docker escribe a stdout por defecto
; Descomentar si se necesita archivo de log persistente:
; logfile = /var/log/odoo/odoo.log
log_level = warn
log_handler = :WARNING

; --- Limites de memoria (bytes) ---
; soft: 640 MB  |  hard: 768 MB (ajustado para servidor 2 GB)
; Aumentar a 2 GB soft / 2.5 GB hard cuando el servidor tenga 8 GB RAM
limit_memory_soft = 671088640
limit_memory_hard = 805306368

; --- Limites de tiempo (segundos) ---
limit_time_cpu = 600
limit_time_real = 1200
limit_request = 8192
