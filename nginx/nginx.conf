# /opt/odoo/nginx/nginx.conf
# Reemplazar TU_DOMINIO.com por el dominio real antes de iniciar.

upstream odoo {
    server web:8069;
}

upstream odoo-longpolling {
    server web:8072;
}

# Redireccion HTTP -> HTTPS
server {
    listen 80;
    server_name TU_DOMINIO.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor HTTPS principal
server {
    listen 443 ssl;
    server_name TU_DOMINIO.com;

    # Certificados generados por Certbot
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Protocolos y cifrados seguros
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!eNULL:!EXPORT:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Cabeceras de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # Timeouts extendidos para operaciones largas de Odoo
    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    # Cabeceras de proxy
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;

    # Longpolling (chat en tiempo real, notificaciones)
    location /longpolling/ {
        proxy_pass http://odoo-longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Assets estaticos con cache agresivo
    location ~* /web/static/ {
        proxy_cache_valid 200 90d;
        proxy_buffering   on;
        expires           864000;
        proxy_pass        http://odoo;
    }

    # Trafico principal de Odoo
    location / {
        proxy_pass     http://odoo;
        proxy_redirect off;
    }

    # Limite de tamano para subida de archivos (facturas, imagenes, etc.)
    client_max_body_size 100M;

    # Compresion gzip
    gzip            on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/css text/less text/plain text/xml
                    application/xml application/json application/javascript
                    font/ttf font/otf image/svg+xml;
}
